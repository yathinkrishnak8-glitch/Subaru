<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Activity Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://g.embedit.in/discord-embedded-app-sdk-1.0.0.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-base-300 text-base-content min-h-screen font-sans flex flex-col selection:bg-primary selection:text-primary-content">

    <div id="loadingOverlay" class="fixed inset-0 bg-base-900 bg-opacity-95 z-50 flex flex-col items-center justify-center p-4">
        <div class="relative w-16 h-16 flex items-center justify-center">
            <span class="loading loading-ring loading-lg text-primary scale-125"></span>
            <i class="fa-solid fa-play text-xl text-primary animate-pulse"></i>
        </div>
        <h2 class="text-lg font-black tracking-widest text-white uppercase mt-4 text-center">Extension Engine</h2>
        <p class="text-xs text-neutral-content/70 mt-1 text-center max-w-xs animate-pulse">Mounting Python extension providers... Please wait.</p>
    </div>

    <header class="navbar bg-base-200 border-b border-base-100 px-4 lg:px-8 sticky top-0 z-40 shadow-lg backdrop-blur-md bg-opacity-90">
        <div class="flex-1">
            <button onclick="location.reload()" class="btn btn-ghost normal-case p-0 hover:bg-transparent text-xl font-black tracking-tighter text-primary flex items-center gap-2">
                <i class="fa-solid fa-square-rss text-2xl"></i>
                <span class="text-white">STREAM</span>
            </button>
        </div>
        <div class="flex-none w-full max-w-xs sm:max-w-sm md:max-w-md ml-2">
            <div class="join w-full shadow-md rounded-xl overflow-hidden border border-base-100">
                <input id="searchInput" type="text" placeholder="Search across extensions..." class="input input-sm sm:input-md bg-base-100 join-item w-full focus:outline-none focus:border-primary text-xs sm:text-sm font-semibold px-3" onkeyup="if(event.key === 'Enter') executeSearch()" />
                <button onclick="executeSearch()" class="btn btn-sm sm:btn-md btn-primary join-item px-4 sm:px-6">
                    <i class="fa-solid fa-magnifying-glass text-xs sm:text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 container mx-auto p-4 sm:p-6 lg:p-8 max-w-7xl">
        <section id="playerSection" class="hidden mb-6 sm:mb-8 card bg-black overflow-hidden shadow-2xl border border-neutral/30 rounded-2xl transition-all">
            <div id="videoContainer" class="w-full aspect-video bg-neutral-950"></div>
            <div class="p-4 bg-base-200 border-t border-base-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div class="flex items-start gap-3">
                    <div class="p-2 bg-primary/10 rounded-lg text-primary hidden sm:inline-block mt-1">
                        <i class="fa-solid fa-compact-disc animate-spin text-lg"></i>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 flex-wrap mb-0.5">
                            <span class="badge badge-primary badge-xs font-bold tracking-wider uppercase">Active Session</span>
                            <span id="activeMetaProvider" class="badge badge-outline badge-neutral badge-xs font-bold text-neutral-content opacity-80 uppercase tracking-widest">Routing...</span>
                        </div>
                        <h3 id="playingTitle" class="font-extrabold text-sm sm:text-md text-white tracking-tight line-clamp-1">Initializing content stream pipeline...</h3>
                    </div>
                </div>
            </div>
        </section>

        <div class="flex items-center justify-between mb-4 sm:mb-6" id="sectionHeaderContainer">
            <div class="flex items-center gap-2">
                <div class="h-5 w-1 bg-primary rounded-full"></div>
                <h2 id="sectionTitle" class="text-sm sm:text-md font-black tracking-wider uppercase text-white">Extension Dashboard</h2>
            </div>
            <div id="headerActions"></div>
        </div>

        <div id="contentGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-5 transition-all">
            <div class="col-span-full text-center py-16 sm:py-24 bg-base-200 rounded-2xl border border-base-100 p-4 shadow-inner">
                <div class="w-14 h-14 bg-base-100 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-neutral/20 shadow-sm text-neutral-content/40">
                    <i class="fa-solid fa-plug text-2xl"></i>
                </div>
                <h3 class="text-sm sm:text-md font-bold text-neutral-content">Extension Manager Ready</h3>
                <p class="text-xs text-neutral-content/50 mt-1 max-w-xs mx-auto px-4">Search terms are automatically routed through all active Python scraping extensions until a match is found.</p>
            </div>
        </div>
    </main>

    <script>
        const BACKEND_URL = "https://subaru-my7g.onrender.com";
        const WS_URL = "wss://subaru-my7g.onrender.com";

        let discordSdk = null;
        let currentUser = { id: "local_dev_user" };
        let currentRoom = "local_dev_room";
        let wsConn = null;
        let art = null;
        let currentAnimeId = "";
        let currentEpisodeNum = 1;
        let currentEpisodeList = [];
        let internalSyncChange = false;

        window.addEventListener('DOMContentLoaded', async () => {
            await initializeAppLifecycle();
        });

        async function initializeAppLifecycle() {
            try {
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 35000); 
                await fetch(`${BACKEND_URL}/api/search?q=ping`, { signal: controller.signal }).catch(() => {});
                document.getElementById('loadingOverlay').classList.add('hidden');
            } catch (err) {
                document.getElementById('loadingOverlay').classList.add('hidden'); 
            }

            if (typeof DiscordSDK !== 'undefined') {
                try {
                    discordSdk = new DiscordSDK.SDK("1512914514960449556");
                    await discordSdk.ready();
                    const auth = await discordSdk.commands.authorize({
                        client_id: "1512914514960449556",
                        scope: ["identify", "guilds.channels.read"],
                    });
                    const response = await discordSdk.commands.authenticate({ access_token: auth.code });
                    currentUser = response.user;
                    currentRoom = discordSdk.instanceId || "fallback_room";
                } catch (e) {
                    console.log("Local Sandbox execution running.");
                }
            }
            initWebSocket();
        }

        function initWebSocket() {
            wsConn = new WebSocket(`${WS_URL}/ws/${currentRoom}`);
            wsConn.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (!art) return;

                internalSyncChange = true; 
                if (msg.action === "pause" && art.playing) {
                    art.pause();
                } else if (msg.action === "play" && !art.playing) {
                    art.play();
                } else if (msg.action === "seek" && Math.abs(art.currentTime - msg.time) > 2) {
                    art.currentTime = msg.time;
                }
                internalSyncChange = false;
            };
            wsConn.onclose = () => setTimeout(initWebSocket, 4000);
        }

        async function executeSearch() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;
            
            document.getElementById('sectionTitle').innerText = "Extension Results";
            document.getElementById('headerActions').innerHTML = '';
            const grid = document.getElementById('contentGrid');
            
            grid.className = "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-5 transition-all";
            grid.innerHTML = `<div class="col-span-full text-center py-16"><span class="loading loading-spinner loading-md text-primary"></span></div>`;
            
            try {
                const res = await fetch(`${BACKEND_URL}/api/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                grid.innerHTML = "";
                
                if(!data.results || data.results.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-16 text-neutral-content">
                            <i class="fa-solid fa-box-open text-3xl mb-2 opacity-30"></i>
                            <p class="text-xs font-bold">No items found across active extensions.</p>
                        </div>`;
                    return;
                }

                data.results.forEach(anime => {
                    const typeBadge = anime.type ? `<span class="badge bg-neutral-900/80 border-none backdrop-blur-md font-black text-[9px] px-1.5 py-0.5 text-white shadow-sm uppercase">${anime.type}</span>` : '';

                    grid.innerHTML += `
                        <div class="group bg-base-200 overflow-hidden shadow-md cursor-pointer hover:shadow-xl border border-base-100 hover:border-primary/40 transition-all duration-300 relative rounded-xl flex flex-col" onclick="loadAnimeDetails('${anime.id}')">
                            <div class="absolute top-1.5 left-1.5 z-10 flex flex-col gap-1 pointer-events-none">
                                ${typeBadge}
                            </div>
                            
                            <figure class="overflow-hidden aspect-[11/16] bg-neutral-900 relative">
                                <img src="${anime.image}" class="object-cover h-full w-full group-hover:scale-105 transition-all duration-500" loading="lazy" />
                                <div class="absolute inset-0 bg-gradient-to-t from-base-900 via-base-900/10 to-transparent opacity-80"></div>
                            </figure>
                            
                            <div class="p-2 flex-1 flex flex-col justify-between">
                                <h2 class="font-bold text-xs tracking-tight text-white line-clamp-2 min-h-[2rem] group-hover:text-primary transition-colors leading-tight">${anime.title}</h2>
                            </div>
                        </div>`;
                });
            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-error text-center py-10 text-xs font-bold"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Provider gateway timeout.</div>`;
            }
        }

        async function loadAnimeDetails(animeId) {
            currentAnimeId = animeId;
            document.getElementById('sectionTitle').innerText = "Extracting Index...";
            const grid = document.getElementById('contentGrid');
            
            grid.className = "block w-full transition-all space-y-4";
            grid.innerHTML = `<div class="text-center py-16"><span class="loading loading-ring loading-md text-primary"></span></div>`;
            
            try {
                // Ensure | characters pass safely
                const safeId = encodeURIComponent(animeId);
                const res = await fetch(`${BACKEND_URL}/api/anime/${safeId}`);
                const data = await res.json();
                
                currentEpisodeList = data.episodes || [];
                document.getElementById('activeMetaProvider').innerText = `EXT: ${data.provider || "Unknown"}`;
                
                if (!currentEpisodeList || currentEpisodeList.length === 0) {
                    grid.className = "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-5 transition-all";
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-16 bg-base-200 rounded-2xl border border-base-100 p-4">
                            <i class="fa-solid fa-circle-exclamation text-3xl text-warning mb-2"></i>
                            <h3 class="text-sm font-bold text-white">Data Missing</h3>
                            <p class="text-xs text-neutral-content/60 mt-1 max-w-sm mx-auto mb-4">The extension successfully mapped the title, but no stream files are currently hosted for it.</p>
                            <button onclick="executeSearch()" class="btn btn-xs btn-outline btn-neutral rounded-lg"><i class="fa-solid fa-arrow-left"></i> Return to Results</button>
                        </div>`;
                    return;
                }
                
                const historyRes = await fetch(`${BACKEND_URL}/api/history/get?user_id=${currentUser.id}&anime_id=${safeId}`);
                const historyData = await historyRes.json();
                
                currentEpisodeNum = historyData.episode_num;
                renderEpisodeCatalog(historyData.progress_seconds);
            } catch (err) {
                grid.className = "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-5 transition-all";
                grid.innerHTML = `<div class="col-span-full text-error text-center py-10 text-xs font-bold">Failed to load content mapping from Extension.</div>`;
            }
        }

        function renderEpisodeCatalog(resumeSeconds = 0) {
            document.getElementById('sectionTitle').innerText = "Select Volume";
            
            document.getElementById('headerActions').innerHTML = `
                <button onclick="executeSearch()" class="btn btn-xs sm:btn-sm btn-outline btn-neutral rounded-lg flex items-center gap-1">
                    <i class="fa-solid fa-chevron-left text-[10px]"></i> Go Back
                </button>`;
                
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = `
                <div class="flex items-center justify-between bg-base-200 p-3 rounded-xl border border-base-100 shadow-sm text-xs mb-3">
                    <span class="font-medium text-neutral-content">Total Stream Volumes: <b class="text-white">${currentEpisodeList.length}</b></span>
                </div>`;
            
            const container = document.createElement('div');
            container.className = "grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 xl:grid-cols-12 gap-2 w-full";

            currentEpisodeList.forEach(ep => {
                const isCurrent = ep.number === currentEpisodeNum;
                container.innerHTML += `
                    <button class="btn btn-sm ${isCurrent ? 'btn-primary font-black shadow-md' : 'btn-neutral border border-base-100/50 font-semibold'} text-xs rounded-lg transition-transform active:scale-95 w-full" onclick="launchStream('${ep.id}', ${ep.number}, ${isCurrent ? resumeSeconds : 0})">
                        ${isCurrent ? '<i class="fa-solid fa-play text-[9px] animate-pulse mr-0.5"></i>' : ''}EP ${ep.number}
                    </button>`;
            });
            grid.appendChild(container);
        }

        async function launchStream(episodeId, episodeNum, startTime = 0) {
            currentEpisodeNum = episodeNum;
            document.getElementById('playerSection').classList.remove('hidden');
            document.getElementById('playingTitle').innerText = `Episode Volume ${episodeNum}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });

            try {
                const safeEpId = encodeURIComponent(episodeId);
                const res = await fetch(`${BACKEND_URL}/api/stream?episode_id=${safeEpId}`);
                const data = await res.json();
                
                const source = data.sources.find(s => s.quality === "default") || data.sources.find(s => s.quality === "auto") || data.sources[0];
                setupVideoPlayer(source.url, startTime);
            } catch (err) {
                alert("Decryption parsing failed downloading transport manifest configurations.");
            }
        }

        function setupVideoPlayer(streamUrl, startTime) {
            if (art) art.destroy();

            art = new Artplayer({
                container: '#videoContainer',
                url: streamUrl,
                type: 'm3u8',
                customPlaybackRate: [0.75, 1, 1.25, 1.5, 2],
                autoSize: false,
                fullscreen: true,
                airplay: true,
                theme: '#570df8', 
                customType: {
                    m3u8: function (video, url) {
                        if (Hls.isSupported()) {
                            const hls = new Hls();
                            hls.loadSource(url);
                            hls.attachMedia(video);
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = url;
                        }
                    },
                },
            });

            art.on('ready', () => {
                if (startTime > 0) art.currentTime = startTime;
                
                art.on('play', () => {
                    if (!internalSyncChange) wsConn.send(JSON.stringify({ action: "play" }));
                });
                art.on('pause', () => {
                    if (!internalSyncChange) wsConn.send(JSON.stringify({ action: "pause" }));
                });
                art.on('seek', (time) => {
                    if (!internalSyncChange) wsConn.send(JSON.stringify({ action: "seek", time }));
                });

                setInterval(() => {
                    if (art && art.playing) {
                        fetch(`${BACKEND_URL}/api/history/save`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                user_id: currentUser.id,
                                anime_id: currentAnimeId,
                                episode_num: currentEpisodeNum,
                                progress_seconds: art.currentTime
                            })
                        }).catch(() => {});
                    }
                }, 10000);
            });
        }
    </script>
</body>
</html>
